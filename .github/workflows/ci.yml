name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION:              '10.0.x'
  DOTNET_NOLOGO:               true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES:              ${{ github.workspace }}/.nuget/packages

# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# CHANGE DETECTION
# Downstream jobs read these outputs to decide whether to run.
# Shared + ServiceDefaults changes mark ALL services as changed.
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      identity:     ${{ steps.filter.outputs.identity }}
      academic:     ${{ steps.filter.outputs.academic }}
      student:      ${{ steps.filter.outputs.student }}
      attendance:   ${{ steps.filter.outputs.attendance }}
      examination:  ${{ steps.filter.outputs.examination }}
      fee:          ${{ steps.filter.outputs.fee }}
      faculty:      ${{ steps.filter.outputs.faculty }}
      hostel:       ${{ steps.filter.outputs.hostel }}
      notification: ${{ steps.filter.outputs.notification }}
      gateway:      ${{ steps.filter.outputs.gateway }}
      bff:          ${{ steps.filter.outputs.bff }}
      shared:       ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            identity:
              - 'src/Services/Identity/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            academic:
              - 'src/Services/Academic/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            student:
              - 'src/Services/Student/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            attendance:
              - 'src/Services/Attendance/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            examination:
              - 'src/Services/Examination/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            fee:
              - 'src/Services/Fee/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            faculty:
              - 'src/Services/Faculty/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            hostel:
              - 'src/Services/Hostel/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            notification:
              - 'src/Services/Notification/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            gateway:
              - 'src/ApiGateway/**'
              - 'src/ServiceDefaults/**'
            bff:
              - 'src/BFF/**'
              - 'src/ServiceDefaults/**'

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # BUILD â€” whole solution, uploads artifact for downstream jobs
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore UMS.slnx

      - name: Build
        run: dotnet build UMS.slnx --no-restore --configuration Release

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: '**/bin/Release/**'
          retention-days: 1

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # UNIT TESTS â€” 9 services in parallel, change-aware
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  unit-tests:
    name: "Tests: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    strategy:
      fail-fast: false
      max-parallel: 9
      matrix:
        include:
          - service:  Academic
            project:  src/Services/Academic/Academic.Tests/Academic.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.academic }}
          - service:  Student
            project:  src/Services/Student/Student.Tests/Student.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.student }}
          - service:  Identity
            project:  src/Services/Identity/Identity.Tests/Identity.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.identity }}
          - service:  Faculty
            project:  src/Services/Faculty/Faculty.Tests/Faculty.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.faculty }}
          - service:  Attendance
            project:  src/Services/Attendance/Attendance.Tests/Attendance.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.attendance }}
          - service:  Examination
            project:  src/Services/Examination/Examination.Tests/Examination.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.examination }}
          - service:  Fee
            project:  src/Services/Fee/Fee.Tests/Fee.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.fee }}
          - service:  Notification
            project:  src/Services/Notification/Notification.Tests/Notification.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.notification }}
          - service:  Hostel
            project:  src/Services/Hostel/Hostel.Tests/Hostel.Tests.csproj
            changed:  ${{ needs.detect-changes.outputs.hostel }}

    steps:
      - name: Gate â€” run or skip
        id: gate
        run: |
          if [[ "${{ matrix.changed }}" == "true"                  || \
                "${{ needs.detect-changes.outputs.shared }}" == "true" || \
                "${{ github.ref }}" == "refs/heads/main"            || \
                "${{ github.event_name }}" == "pull_request" ]]; then
            echo "run=true"  >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "â­ Skipping ${{ matrix.service }} â€” no relevant changes"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-dotnet@v4
        if: steps.gate.outputs.run == 'true'
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        if: steps.gate.outputs.run == 'true'
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        if: steps.gate.outputs.run == 'true'
        run: dotnet restore ${{ matrix.project }}

      - name: Test
        if: steps.gate.outputs.run == 'true'
        run: |
          dotnet test ${{ matrix.project }} \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage"

      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.run == 'true' && always()
        with:
          name: unit-test-results-${{ matrix.service }}
          path: ./TestResults/*.trx
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.run == 'true' && always()
        with:
          name: coverage-${{ matrix.service }}
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 7

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # INTEGRATION TESTS â€” database-backed, main + PRs only
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, detect-changes]
    if: |
      always()                                         &&
      needs.unit-tests.result != 'failure'             &&
      (
        github.ref == 'refs/heads/main'                ||
        github.event_name == 'pull_request'            ||
        needs.detect-changes.outputs.shared == 'true'
      )
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       ums_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Tests/TenantIsolation.Tests/TenantIsolation.Tests.csproj

      - name: Test
        run: |
          dotnet test src/Tests/TenantIsolation.Tests/TenantIsolation.Tests.csproj \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults
        env:
          ConnectionStrings__postgres: >-
            Host=localhost;Port=5432;Database=ums_test;
            Username=postgres;Password=postgres

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./TestResults/*.trx
          retention-days: 7

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # TEST SUMMARY + COVERAGE
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  test-summary:
    name: Test Summary & Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./TestResults
          pattern: '*-test-results*'

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:          Test Results
          path:          './TestResults/**/*.trx'
          reporter:      dotnet-trx
          fail-on-error: true

      - uses: actions/download-artifact@v4
        with:
          path: ./Coverage
          pattern: 'coverage-*'

      - uses: danielpalme/ReportGenerator-GitHub-Action@5
        if: always()
        with:
          reports:         './Coverage/**/coverage.cobertura.xml'
          targetdir:       './CoverageReport'
          reporttypes:     'MarkdownSummaryGithub;Cobertura'
          assemblyfilters: '+*'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-merged
          path: ./CoverageReport
          retention-days: 14

      - name: Post coverage to job summary
        if: always()
        run: |
          [ -f ./CoverageReport/SummaryGithub.md ] && \
            cat ./CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
      - name: Enforce coverage threshold
        if: always()
        run: |
          THRESHOLD=70
          FAILED=0

          # Parse line coverage from merged Cobertura report
          if [ -f ./CoverageReport/Cobertura.xml ]; then
            COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('./CoverageReport/Cobertura.xml')
          root = tree.getroot()
          lr = float(root.get('line-rate', 0)) * 100
          print(f'{lr:.1f}')
          " 2>/dev/null || echo "0")

            echo "Line coverage: ${COVERAGE}%  (threshold: ${THRESHOLD}%)"
            echo "| Coverage | ${COVERAGE}% | Threshold: ${THRESHOLD}% |" >> $GITHUB_STEP_SUMMARY

            COVERAGE_INT=$(python3 -c "print(int(float('${COVERAGE}')))" 2>/dev/null || echo "0")

            if [ "$COVERAGE_INT" -lt "$THRESHOLD" ]; then
              echo "❌ Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
              echo "::error title=Coverage below threshold::Line coverage ${COVERAGE}% < ${THRESHOLD}%"
              exit 1
            else
              echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠ Coverage report not found — skipping threshold check"
          fi


