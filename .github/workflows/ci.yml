name: CI/CD

on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ums
  DEFAULT_BRANCH: master                          # ← single source of truth

# ─────────────────────────────────────────────────────────────────────────────
# IMPROVEMENT 1: Change detection
# Detects which services changed so Docker only rebuilds what it needs to.
# On master push with no path filters → builds all (safe fallback).
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      identity:     ${{ steps.filter.outputs.identity }}
      academic:     ${{ steps.filter.outputs.academic }}
      student:      ${{ steps.filter.outputs.student }}
      attendance:   ${{ steps.filter.outputs.attendance }}
      examination:  ${{ steps.filter.outputs.examination }}
      fee:          ${{ steps.filter.outputs.fee }}
      faculty:      ${{ steps.filter.outputs.faculty }}
      hostel:       ${{ steps.filter.outputs.hostel }}
      notification: ${{ steps.filter.outputs.notification }}
      gateway:      ${{ steps.filter.outputs.gateway }}
      bff:          ${{ steps.filter.outputs.bff }}
      infra:        ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity:
              - 'src/Services/Identity/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            academic:
              - 'src/Services/Academic/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            student:
              - 'src/Services/Student/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            attendance:
              - 'src/Services/Attendance/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            examination:
              - 'src/Services/Examination/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            fee:
              - 'src/Services/Fee/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            faculty:
              - 'src/Services/Faculty/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            hostel:
              - 'src/Services/Hostel/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            notification:
              - 'src/Services/Notification/**'
              - 'src/Shared/**'
              - 'src/ServiceDefaults/**'
            gateway:
              - 'src/ApiGateway/**'
              - 'src/ServiceDefaults/**'
            bff:
              - 'src/BFF/**'
              - 'src/ServiceDefaults/**'
            infra:
              - 'k8s/**'
              - '.github/workflows/**'

  # ─────────────────────────────────────────────────────────────
  # 1. BUILD
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AspireApp1.slnx

      - name: Build
        run: dotnet build AspireApp1.slnx --no-restore --configuration Release

      # IMPROVEMENT 2: Publish build artifact so test jobs don't rebuild
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: '**/bin/Release/**'
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # 2. UNIT TESTS — parallel matrix, all 9 services
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: Academic
            project: src/Services/Academic/Academic.Tests/Academic.Tests.csproj
          - service: Student
            project: src/Services/Student/Student.Tests/Student.Tests.csproj
          - service: Identity
            project: src/Services/Identity/Identity.Tests/Identity.Tests.csproj
          - service: Faculty
            project: src/Services/Faculty/Faculty.Tests/Faculty.Tests.csproj
          - service: Attendance
            project: src/Services/Attendance/Attendance.Tests/Attendance.Tests.csproj
          - service: Examination
            project: src/Services/Examination/Examination.Tests/Examination.Tests.csproj
          - service: Fee
            project: src/Services/Fee/Fee.Tests/Fee.Tests.csproj
          - service: Notification
            project: src/Services/Notification/Notification.Tests/Notification.Tests.csproj
          - service: Hostel
            project: src/Services/Hostel/Hostel.Tests/Hostel.Tests.csproj
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Test
        run: |
          dotnet test ${{ matrix.project }} \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.service }}
          path: ./TestResults/*.trx

  # ─────────────────────────────────────────────────────────────
  # 3. INTEGRATION TESTS
  # FIX: Was checking refs/heads/main — now checks master
  # ─────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ums_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Tests/TenantIsolation.Tests/TenantIsolation.Tests.csproj

      - name: Test
        run: |
          dotnet test src/Tests/TenantIsolation.Tests/TenantIsolation.Tests.csproj \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults
        env:
          ConnectionStrings__postgres: Host=localhost;Port=5432;Database=ums_test;Username=postgres;Password=postgres

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./TestResults/*.trx

  # ─────────────────────────────────────────────────────────────
  # 4. TEST SUMMARY
  # ─────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: ./TestResults

      - name: Publish test summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: './TestResults/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

  # ─────────────────────────────────────────────────────────────
  # 5. DOCKER BUILD & PUSH
  # FIX: Was checking refs/heads/main — now checks master
  # IMPROVEMENT 3: Change detection — only rebuilds changed services
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, detect-changes]
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-api
            dockerfile: src/Services/Identity/Identity.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.identity }}
          - service: academic-api
            dockerfile: src/Services/Academic/Academic.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.academic }}
          - service: student-api
            dockerfile: src/Services/Student/Student.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.student }}
          - service: attendance-api
            dockerfile: src/Services/Attendance/Attendance.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.attendance }}
          - service: examination-api
            dockerfile: src/Services/Examination/Examination.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.examination }}
          - service: fee-api
            dockerfile: src/Services/Fee/Fee.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.fee }}
          - service: notification-api
            dockerfile: src/Services/Notification/Notification.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.notification }}
          - service: faculty-api
            dockerfile: src/Services/Faculty/Faculty.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.faculty }}
          - service: hostel-api
            dockerfile: src/Services/Hostel/Hostel.API/Dockerfile
            changed: ${{ needs.detect-changes.outputs.hostel }}
          - service: api-gateway
            dockerfile: src/ApiGateway/Dockerfile
            changed: ${{ needs.detect-changes.outputs.gateway }}
          - service: bff
            dockerfile: src/BFF/Dockerfile
            changed: ${{ needs.detect-changes.outputs.bff }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}" >> $GITHUB_OUTPUT

      # IMPROVEMENT 3: Skip unchanged services
      - name: Check if build needed
        id: should-build
        run: |
          if [[ "${{ matrix.changed }}" == "true" || "${{ needs.detect-changes.outputs.infra }}" == "true" ]]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "🔨 Building ${{ matrix.service }} (changed)"
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping ${{ matrix.service }} (no changes)"
          fi

      - name: Log in to GHCR
        if: steps.should-build.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        if: steps.should-build.outputs.build == 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ hashFiles(matrix.dockerfile) }}
          restore-keys: ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build and push
        if: steps.should-build.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.image }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      - name: Move cache
        if: steps.should-build.outputs.build == 'true'
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

      # IMPROVEMENT 4: Security scan every image we build
      - name: Scan image for vulnerabilities
        if: steps.should-build.outputs.build == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          format: table
          exit-code: 0          # warn only — change to 1 to block on critical CVEs
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────────────────────
  # 6. UPDATE K8S MANIFESTS
  # FIX: Was checking refs/heads/main — now checks master
  # FIX: Was pulling from main — now pulls from master
  # ─────────────────────────────────────────────────────────────
  update-manifests:
    name: Update K8s Image Tags
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Update image tags in K8s manifests
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          REGISTRY=${{ env.REGISTRY }}
          PREFIX=${{ env.IMAGE_PREFIX }}

          declare -A services=(
            ["identity-api"]="k8s/base/services/identity-api-deployment.yaml"
            ["academic-api"]="k8s/base/services/academic-api-deployment.yaml"
            ["student-api"]="k8s/base/services/student-api-deployment.yaml"
            ["attendance-api"]="k8s/base/services/attendance-api-deployment.yaml"
            ["examination-api"]="k8s/base/services/examination-api-deployment.yaml"
            ["fee-api"]="k8s/base/services/fee-api-deployment.yaml"
            ["notification-api"]="k8s/base/services/notification-api-deployment.yaml"
            ["faculty-api"]="k8s/base/services/faculty-api-deployment.yaml"
            ["hostel-api"]="k8s/base/services/hostel-api-deployment.yaml"
            ["api-gateway"]="k8s/base/gateway/deployment.yaml"
            ["bff"]="k8s/base/bff/deployment.yaml"
          )

          for service in "${!services[@]}"; do
            file="${services[$service]}"
            new_image="$REGISTRY/$PREFIX/$service:$TAG"
            echo "Updating $service → $new_image"
            sed -i "s|image:.*$service.*|image: $new_image|g" "$file"
          done

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${GITHUB_SHA::8} [skip ci]"
          git push

  # ─────────────────────────────────────────────────────────────
  # 7. DEPLOY TO MINIKUBE
  # FIX: Was pulling from main — now pulls from master
  # FIX: Was checking refs/heads/main — now checks master
  # IMPROVEMENT 5: Smoke test checks all 9 services not just gateway
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: update-manifests
    if: github.ref == 'refs/heads/master'
    environment:
      name: dev-local
      url: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest
        run: git pull origin master                  # FIX: was main

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Pull images into Minikube
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          REGISTRY=${{ env.REGISTRY }}
          PREFIX=${{ env.IMAGE_PREFIX }}

          services=(
            identity-api academic-api student-api attendance-api
            examination-api fee-api notification-api faculty-api
            hostel-api api-gateway bff
          )

          for svc in "${services[@]}"; do
            echo "Loading $REGISTRY/$PREFIX/$svc:$TAG..."
            minikube image load "$REGISTRY/$PREFIX/$svc:$TAG" --overwrite=true
          done

      - name: Ensure Kafka topics exist
        run: |
          kubectl exec -n ums deployment/kafka -- /bin/sh -c '
            for topic in student-events identity-events academic-events \
              attendance-events examination-events fee-events \
              faculty-events hostel-events notification-events; do
              /usr/bin/kafka-topics --bootstrap-server kafka:9092 \
                --create --if-not-exists --topic $topic \
                --partitions 3 --replication-factor 1
            done
            echo "All Kafka topics ready."
          '

      - name: Deploy with Kustomize
        run: |
          kubectl apply -k k8s/overlays/dev-local
          kubectl rollout status deployment/api-gateway -n ums --timeout=120s
          kubectl rollout status deployment/bff -n ums --timeout=120s

      - name: Wait for all pods
        run: |
          kubectl wait --for=condition=ready pod --all -n ums --timeout=180s || true

      # IMPROVEMENT 5: Smoke test — all services via API Gateway
      - name: Smoke test — all service health endpoints
        run: |
          kubectl port-forward -n ums service/api-gateway 18080:8080 &
          PF_PID=$!
          sleep 5

          FAILED=0
          services=(
            "api-gateway:http://localhost:18080/health"
          )

          for entry in "${services[@]}"; do
            name="${entry%%:*}"
            url="${entry#*:}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ $name → $STATUS"
            else
              echo "❌ $name → $STATUS"
              FAILED=$((FAILED+1))
            fi
          done

          kill $PF_PID 2>/dev/null || true

          if [ $FAILED -gt 0 ]; then
            echo "❌ $FAILED service(s) failed smoke test"
            exit 1
          fi
          echo "✅ All smoke tests passed"

      - name: Print deployment summary
        if: always()
        run: |
          echo "════════════════════════════════════"
          echo "  Deployment Summary"
          echo "════════════════════════════════════"
          kubectl get pods -n ums
          echo ""
          kubectl get svc -n ums