name: CI/CD

on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ums

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. BUILD
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AspireApp1.slnx

      - name: Build
        run: dotnet build AspireApp1.slnx --no-restore --configuration Release

  # ─────────────────────────────────────────────────────────────
  # 2. UNIT TESTS
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: Academic
            project: src/Services/Academic/Academic.Tests/Academic.Tests.csproj
          - service: Student
            project: src/Services/Student/Student.Tests/Student.Tests.csproj
          - service: Identity
            project: src/Services/Identity/Identity.Tests/Identity.Tests.csproj
          - service: Faculty
            project: src/Services/Faculty/Faculty.Tests/Faculty.Tests.csproj
          - service: Attendance
            project: src/Services/Attendance/Attendance.Tests/Attendance.Tests.csproj
          - service: Examination
            project: src/Services/Examination/Examination.Tests/Examination.Tests.csproj
          - service: Fee
            project: src/Services/Fee/Fee.Tests/Fee.Tests.csproj
          - service: Notification
            project: src/Services/Notification/Notification.Tests/Notification.Tests.csproj
          - service: Hostel
            project: src/Services/Hostel/Hostel.Tests/Hostel.Tests.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Test
        run: |
          dotnet test ${{ matrix.project }} \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.service }}
          path: ./TestResults/*.trx

  # ─────────────────────────────────────────────────────────────
  # 3. INTEGRATION TESTS
  # ─────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ums_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/Tests/TenantIsolation.Tests/TenantIsolation.Tests.csproj

      - name: Test
        run: |
          dotnet test src/Tests/TenantIsolation.Tests/TenantIsolation.Tests.csproj \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults
        env:
          ConnectionStrings__postgres: Host=localhost;Port=5432;Database=ums_test;Username=postgres;Password=postgres

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./TestResults/*.trx

  # ─────────────────────────────────────────────────────────────
  # 4. TEST SUMMARY
  # ─────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: ./TestResults

      - name: Publish test summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: './TestResults/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

  # ─────────────────────────────────────────────────────────────
  # 5. DOCKER BUILD & PUSH (main branch only)
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-api
            dockerfile: src/Services/Identity/Identity.API/Dockerfile
            context: .
          - service: academic-api
            dockerfile: src/Services/Academic/Academic.API/Dockerfile
            context: .
          - service: student-api
            dockerfile: src/Services/Student/Student.API/Dockerfile
            context: .
          - service: attendance-api
            dockerfile: src/Services/Attendance/Attendance.API/Dockerfile
            context: .
          - service: examination-api
            dockerfile: src/Services/Examination/Examination.API/Dockerfile
            context: .
          - service: fee-api
            dockerfile: src/Services/Fee/Fee.API/Dockerfile
            context: .
          - service: notification-api
            dockerfile: src/Services/Notification/Notification.API/Dockerfile
            context: .
          - service: faculty-api
            dockerfile: src/Services/Faculty/Faculty.API/Dockerfile
            context: .
          - service: hostel-api
            dockerfile: src/Services/Hostel/Hostel.API/Dockerfile
            context: .
          - service: api-gateway
            dockerfile: src/ApiGateway/Dockerfile
            context: .
          - service: bff
            dockerfile: src/BFF/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ hashFiles(matrix.dockerfile) }}
          restore-keys: ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.image }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

      - name: Output image digest
        run: echo "Pushed ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}"

  # ─────────────────────────────────────────────────────────────
  # 6. UPDATE K8S MANIFESTS WITH NEW IMAGE TAGS
  # ─────────────────────────────────────────────────────────────
  update-manifests:
    name: Update K8s Image Tags
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Update image tags in K8s manifests
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          REGISTRY=${{ env.REGISTRY }}
          PREFIX=${{ env.IMAGE_PREFIX }}

          # Update each service deployment with new image tag
          declare -A services=(
            ["identity-api"]="k8s/base/services/identity-api-deployment.yaml"
            ["academic-api"]="k8s/base/services/academic-api-deployment.yaml"
            ["student-api"]="k8s/base/services/student-api-deployment.yaml"
            ["attendance-api"]="k8s/base/services/attendance-api-deployment.yaml"
            ["examination-api"]="k8s/base/services/examination-api-deployment.yaml"
            ["fee-api"]="k8s/base/services/fee-api-deployment.yaml"
            ["notification-api"]="k8s/base/services/notification-api-deployment.yaml"
            ["faculty-api"]="k8s/base/services/faculty-api-deployment.yaml"
            ["hostel-api"]="k8s/base/services/hostel-api-deployment.yaml"
            ["api-gateway"]="k8s/base/gateway/deployment.yaml"
            ["bff"]="k8s/base/bff/deployment.yaml"
          )

          for service in "${!services[@]}"; do
            file="${services[$service]}"
            new_image="$REGISTRY/$PREFIX/$service:$TAG"
            echo "Updating $service → $new_image in $file"
            sed -i "s|image:.*$service.*|image: $new_image|g" "$file"
          done

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${GITHUB_SHA::8} [skip ci]"
          git push

  # ─────────────────────────────────────────────────────────────
  # 7. DEPLOY TO MINIKUBE (self-hosted runner on your WSL2)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: update-manifests
    if: github.ref == 'refs/heads/main'
    environment:
      name: dev-local
      url: http://api.ums.local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest (with updated image tags)
        run: git pull origin main

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Pull images into Minikube
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          REGISTRY=${{ env.REGISTRY }}
          PREFIX=${{ env.IMAGE_PREFIX }}

          services=(
            identity-api academic-api student-api attendance-api
            examination-api fee-api notification-api faculty-api
            hostel-api api-gateway bff
          )

          for svc in "${services[@]}"; do
            echo "Pulling $REGISTRY/$PREFIX/$svc:$TAG into Minikube..."
            minikube image load $REGISTRY/$PREFIX/$svc:$TAG --overwrite=true
          done

      - name: Apply Kafka topics job
        run: |
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: kafka-topics-setup-${{ steps.tag.outputs.tag }}
            namespace: ums
          spec:
            ttlSecondsAfterFinished: 300
            template:
              spec:
                restartPolicy: OnFailure
                containers:
                - name: kafka-topics
                  image: confluentinc/cp-kafka:7.6.0
                  command:
                  - /bin/sh
                  - -c
                  - |
                    topics="student-events identity-events academic-events attendance-events examination-events fee-events faculty-events hostel-events notification-events"
                    for topic in \$topics; do
                      /usr/bin/kafka-topics --bootstrap-server kafka:9092 \
                        --create --if-not-exists --topic \$topic \
                        --partitions 3 --replication-factor 1
                    done
                    echo "All topics ready."
          EOF

      - name: Deploy with Kustomize
        run: |
          kubectl apply -k k8s/overlays/dev-local
          kubectl rollout status deployment/api-gateway -n ums --timeout=120s
          kubectl rollout status deployment/bff -n ums --timeout=120s

      - name: Verify all pods running
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n ums
          echo "=== Services ==="
          kubectl get svc -n ums
          echo "=== Ingress ==="
          kubectl get ingress -n ums

      - name: Health check
        run: |
          kubectl port-forward -n ums service/api-gateway 8080:8080 &
          sleep 5
          curl -f http://localhost:8080/health && echo "✅ API Gateway healthy"
          kill %1