apiVersion: v1
kind: ConfigMap
metadata:
  name: ums-config
  namespace: ums
data:
  # Observability
  Seq__ServerUrl: "http://seq:5341"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"

  # Messaging
  ConnectionStrings__kafka: "kafka:9092"

  # Auth
  Auth__Authority: "http://identity-api:8080"
  Auth__Audience: "api-gateway"
  Auth__RequireHttpsMetadata: "false"

  # Platform
  UMS__SeedTenantSlug: "ums"
  ASPNETCORE_ENVIRONMENT: "Production"

  # Region identity — patched by overlay
  REGION_ID: "__PATCH_REQUIRED__"
  REGION_ROLE: "__PATCH_REQUIRED__"
  REGION_WRITE_ALLOWED: "__PATCH_REQUIRED__"

  # DB connection strings — patched by overlay (credentials must not live here)
  ConnectionStrings__AcademicDb: "__PATCH_REQUIRED__"
  ConnectionStrings__AcademicDbReadOnly: "__PATCH_REQUIRED__"
  ConnectionStrings__AttendanceDb: "__PATCH_REQUIRED__"
  ConnectionStrings__AttendanceDbReadOnly: "__PATCH_REQUIRED__"
  ConnectionStrings__ExaminationDb: "__PATCH_REQUIRED__"
  ConnectionStrings__ExaminationDbReadOnly: "__PATCH_REQUIRED__"
  ConnectionStrings__FacultyDb: "__PATCH_REQUIRED__"
  ConnectionStrings__FacultyDbReadOnly: "__PATCH_REQUIRED__"
  ConnectionStrings__FeeDb: "__PATCH_REQUIRED__"
  ConnectionStrings__FeeDbReadOnly: "__PATCH_REQUIRED__"
  ConnectionStrings__HostelDb: "__PATCH_REQUIRED__"
  ConnectionStrings__HostelDbReadOnly: "__PATCH_REQUIRED__"
  ConnectionStrings__IdentityDb: "__PATCH_REQUIRED__"
  ConnectionStrings__IdentityDbReadOnly: "__PATCH_REQUIRED__"
  ConnectionStrings__NotificationDb: "__PATCH_REQUIRED__"
  ConnectionStrings__NotificationDbReadOnly: "__PATCH_REQUIRED__"
  ConnectionStrings__StudentDb: "__PATCH_REQUIRED__"
  ConnectionStrings__StudentDbReadOnly: "__PATCH_REQUIRED__"
