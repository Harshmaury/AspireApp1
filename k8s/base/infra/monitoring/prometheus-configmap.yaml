apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ums
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      # ── Prometheus self-monitoring ─────────────────────────────────────────
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # ── All UMS microservices via OTLP metrics endpoint ───────────────────
      # Services expose /metrics on port 8080 via OpenTelemetry OTLP
      - job_name: ums-services
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [ums]
        relabel_configs:
          # Only scrape pods that have the annotation prometheus.io/scrape: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Use custom port if annotation present, else default 8080
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: ${__meta_kubernetes_pod_ip}:$1
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1:8080
          # Carry service name as label
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # ── Kubernetes node metrics ───────────────────────────────────────────
      - job_name: kubernetes-nodes
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # ── Kafka JMX metrics (if jmx-exporter is added later) ───────────────
      - job_name: kafka
        static_configs:
          - targets: ['kafka:9404']
        relabel_configs:
          - target_label: service
            replacement: kafka

      # ── PostgreSQL metrics (if postgres-exporter is added later) ─────────
      - job_name: postgres
        static_configs:
          - targets: ['postgres-exporter:9187']
        relabel_configs:
          - target_label: service
            replacement: postgres
