apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: ums
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false

      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
        editable: false

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: UMS Dashboards
        orgId: 1
        folder: UMS
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
