apiVersion: apps/v1
kind: Deployment
metadata:
  name: seq
  namespace: ums
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seq
  template:
    metadata:
      labels:
        app: seq
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: seq
        image: datalust/seq:2024.1
        ports:
        - containerPort: 5341
        - containerPort: 80
        env:
        - name: ACCEPT_EULA
          value: "Y"
        volumeMounts:
        - name: seq-data
          mountPath: /data
        resources:
          requests:
            memory: 256Mi
            cpu: 250m
          limits:
            memory: 512Mi
            cpu: 500m
      volumes:
      - name: seq-data
        persistentVolumeClaim:
          claimName: seq-pvc
