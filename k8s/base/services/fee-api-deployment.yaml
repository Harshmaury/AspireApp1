apiVersion: apps/v1
kind: Deployment
metadata:
  name: fee-api
  namespace: ums
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fee-api
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      labels:
        app: fee-api
    spec:
      containers:
      - name: fee-api
        image: aspireapp1-fee-api:v1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: ums-config
        - secretRef:
            name: ums-secrets
        env:
        - name: OTEL_SERVICE_NAME
          value: fee-api
        resources:
          requests:
            memory: 256Mi
            cpu: 250m
          limits:
            memory: 512Mi
            cpu: 500m
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
